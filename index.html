<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کل‌کل کلاب</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="logo">

👑

<h1>کل‌کل کلاب</h1>

<p>دنیای رقابت</p>

</div>



<!-- ورود -->

<div class="card" id="loginBox">


<h2>ورود به کلاب</h2>


<input 
id="playerName"
placeholder="نام شما">


<input 
id="playerPassword"
type="password"
maxlength="4"
placeholder="رمز ۴ رقمی">


<button onclick="login()">

ورود

</button>


</div>





<!-- صفحه اصلی -->

<div class="card hidden" id="homeBox">


<h2 id="welcome">

</h2>


<div class="score">

⭐ امتیاز:

<span id="score">
0
</span>


</div>



<div class="menu">


<button onclick="showGame()">

⚽ فوتبال

</button>



<button>

🎯 بازی حدس

</button>



<button>

🎲 بازی دورهمی

</button>



<button onclick="ranking()">

🏆 جدول امتیازات

</button>


</div>



<button 
class="hidden"
id="adminBtn">

⚙ پنل مدیریت

</button>


</div>







<!-- بازی فوتبال -->


<div class="card hidden" id="gameBox">


<button onclick="backHome()">

⬅ برگشت

</button>



<h2>

⚽ مسابقه فوتبال

</h2>


<p>

پیش‌بینی‌های فعال:

</p>



<div id="matches">


<div class="card">


<h3>
ایران 🇮🇷 - برزیل 🇧🇷
</h3>


<p>
نتیجه بازی
</p>


<input placeholder="گل ایران">

<input placeholder="گل برزیل">



<p>
گل اول
</p>


<select>

<option>
ایران
</option>


<option>
برزیل
</option>


<option>
بدون گل
</option>


</select>


<button onclick="savePrediction()">

ثبت پیش‌بینی

</button>


</div>


</div>


</div>






<!-- جدول -->

<div class="card hidden" id="rankBox">


<button onclick="backHome()">

⬅ برگشت

</button>



<h2>

🏆 جدول کلاب

</h2>


<div id="ranking">

</div>


</div>







<!-- پنل مدیریت -->


<div class="card hidden" id="adminBox">


<button onclick="backHome()">

⬅ برگشت

</button>


<h2>

⚙ پنل مدیریت

</h2>


<p>

ساخت مسابقه جدید

</p>


<input placeholder="نام مسابقه">


<button>

➕ اضافه کردن مسابقه

</button>


<hr>


<p>

مدیریت کاربران و امتیازات

</p>


</div>




</div>



<script src="script.js"></script>


</body>

</html>
