<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>کل‌کل کلاب</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<div class="logo">

👑
<h1>کل‌کل کلاب</h1>
<p>دنیای رقابت</p>

</div>



<!-- صفحه ورود -->

<div class="card" id="loginBox">


<h2>ورود به کلاب</h2>


<input id="loginName" placeholder="نام شما">


<input 
id="loginPassword"
type="password"
maxlength="4"
placeholder="رمز ۴ رقمی">


<button onclick="login()">

ورود

</button>


<button onclick="showRegister()">

ثبت نام

</button>


</div>





<!-- صفحه ثبت نام -->

<div class="card hidden" id="registerBox">


<h2>ثبت نام عضو جدید</h2>


<input id="registerName" placeholder="نام شما">


<input 
id="registerPassword"
type="password"
maxlength="4"
placeholder="رمز ۴ رقمی">


<input 
id="registerPassword2"
type="password"
maxlength="4"
placeholder="تکرار رمز">


<button onclick="register()">

ساخت حساب

</button>



<button onclick="backLogin()">

⬅ برگشت

</button>


</div>







<!-- صفحه اصلی -->

<div class="card hidden" id="homeBox">


<h2 id="welcome"></h2>


<div class="score">

⭐ امتیاز:

<span id="score">
0
</span>


</div>



<button onclick="showGame()">

⚽ فوتبال

</button>



<button onclick="ranking()">

🏆 جدول امتیازات

</button>



<button id="adminBtn" class="hidden">

⚙ مدیریت

</button>


</div>






<!-- بازی -->

<div class="card hidden" id="gameBox">


<button onclick="backHome()">

⬅ برگشت

</button>


<h2>
⚽ بازی فوتبال
</h2>


<p>
پیش‌بینی خود را ثبت کنید
</p>


<input placeholder="گل تیم اول">

<input placeholder="گل تیم دوم">


<button onclick="savePrediction()">

ثبت پیش‌بینی

</button>


</div>






<!-- جدول -->

<div class="card hidden" id="rankBox">


<button onclick="backHome()">

⬅ برگشت

</button>


<h2>
🏆 جدول
</h2>


<div id="ranking"></div>


</div>



</div>



<script src="script.js"></script>
  

</body>

</html>
